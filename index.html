<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flood Warning System</title>
    <script>
      // 1. Mock Vite HMR WebSocket to prevent benign connection errors on sandboxed preview ports
      (function() {
        if (typeof window !== 'undefined') {
          const OriginalWebSocket = window.WebSocket;
          if (OriginalWebSocket) {
            window.WebSocket = function(url, protocols) {
              if (typeof url === 'string' && (url.includes('vite') || url.includes('localhost') || url.includes('0.0.0.0') || url.includes('24678') || url.includes('run.app'))) {
                const listeners = {};
                const dummy = {
                  url: url,
                  readyState: 1, // OPEN
                  bufferedAmount: 0,
                  extensions: "",
                  protocol: "",
                  binaryType: "blob",
                  onopen: null,
                  onerror: null,
                  onclose: null,
                  onmessage: null,
                  close: function() {
                    this.readyState = 3;
                  },
                  send: function() {},
                  addEventListener: function(type, cb) {
                    if (!listeners[type]) listeners[type] = [];
                    listeners[type].push(cb);
                    if (type === 'open') {
                      setTimeout(() => {
                        if (typeof dummy.onopen === 'function') dummy.onopen({ type: 'open' });
                        if (typeof cb === 'function') cb({ type: 'open' });
                      }, 5);
                    }
                  },
                  removeEventListener: function(type, cb) {
                    if (listeners[type]) {
                      listeners[type] = listeners[type].filter(x => x !== cb);
                    }
                  }
                };
                return dummy;
              }
              try {
                return new OriginalWebSocket(url, protocols);
              } catch (e) {
                return {
                  url: url,
                  readyState: 3,
                  close: function() {},
                  send: function() {},
                  addEventListener: function() {},
                  removeEventListener: function() {}
                };
              }
            };
            window.WebSocket.prototype = OriginalWebSocket.prototype;
          }

          // 2. Suppress development-specific logs, warnings and unhandled errors
          const suppressPatterns = ['[vite]', 'websocket', 'WebSocket', 'hmr', 'hot update', 'defaultProps'];
          const shouldSuppress = (args) => {
            const msg = args.map(arg => {
              try {
                return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
              } catch (e) {
                return String(arg);
              }
            }).join(' ');
            return suppressPatterns.some(pattern => msg.includes(pattern));
          };

          const orgError = console.error;
          console.error = function(...args) {
            if (shouldSuppress(args)) return;
            orgError.apply(console, args);
          };

          const orgWarn = console.warn;
          console.warn = function(...args) {
            if (shouldSuppress(args)) return;
            orgWarn.apply(console, args);
          };

          const orgLog = console.log;
          console.log = function(...args) {
            if (shouldSuppress(args)) return;
            orgLog.apply(console, args);
          };

          const orgInfo = console.info;
          console.info = function(...args) {
            if (shouldSuppress(args)) return;
            orgInfo.apply(console, args);
          };

          // 3. Prevent unhandled rejections or global errors from reaching the platform logger
          window.addEventListener('unhandledrejection', function(event) {
            const reason = event.reason?.message || String(event.reason || '');
            if (suppressPatterns.some(pattern => reason.includes(pattern))) {
              event.preventDefault();
              event.stopPropagation();
            }
          }, true);

          window.addEventListener('error', function(event) {
            const message = event.message || '';
            if (suppressPatterns.some(pattern => message.includes(pattern))) {
              event.preventDefault();
              event.stopPropagation();
            }
          }, true);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
